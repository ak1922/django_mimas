name: docker_wkf.yml
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker_actions:
    name: Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Images
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mimascompany:latest .
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mimascompany:v2 .

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mimascompany:latest
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mimascompany:v2
