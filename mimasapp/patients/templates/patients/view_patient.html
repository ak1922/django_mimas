{% extends 'base.html' %}

{% load static %}

{% block title_content %}View Patient {{ h_patient.full_name }}{% endblock %}

{% block css_content %}
	<link rel="stylesheet" href="{% static 'css/forms.css' %}">
{% endblock %}

{% block body_content %}

    <div class="container">
        <form method="POST">
            {% csrf_token %}
            <h4>View Patient {{ h_patient.full_name }}</h4>
            {{ h_form.as_p }}
            <div class="buttomsDiv">
                <a href="{% url 'patients:listpatients' %}" class="backToListLink">Back To List</a>
            </div>
        </form>
    </div>

{% endblock %}
